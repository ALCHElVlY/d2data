<!doctype html>
<html>
    <head>
        <title>Diablo 2 Skill Calculator</title>
        <meta property="og:title" content="Diablo 2 Skill Calculator">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
		<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
        <link rel="stylesheet" href="skills.css">
        <style>
			.tw-tooltip { position: relative; cursor: default; }
			.tw-tooltip::after {
				content: attr(data-tooltip);
				position: absolute;
				bottom: calc(100% + 4px);
				left: 50%;
				transform: translateX(-50%);
				background: #1f2937;
				color: #f9fafb;
				font-size: 0.75rem;
				padding: 4px 8px;
				border-radius: 4px;
				white-space: nowrap;
				pointer-events: none;
				opacity: 0;
				transition: opacity 0.15s;
				z-index: 50;
			}
			.tw-tooltip:hover::after { opacity: 1; }
        </style>
    </head>
    <body class="max-w-screen-xl mx-auto p-0 mt-3 bg-transparent text-gray-100">
        <div id="skillapp" v-cloak>
            <!-- Build tabs -->
            <div class="flex flex-col sm:flex-row w-full mb-3 bg-gray-900 class-select" id="build-tab">
                <template v-for="(current, buildIndex) in builds">
                    <a v-if="currentBuild === buildIndex" class="flex-1 px-1 py-1 text-center bg-red-700 hover:bg-red-600 text-white text-sm cursor-pointer" @dblclick="renameBuild(buildIndex)">Build: {{ builds[buildIndex].name || (buildIndex + 1) }}<template v-if="buildIndex"> (<a class="text-gray-900" @click="delBuild(buildIndex, $event)">Delete</a>)</template></a>
                    <a v-else class="flex-1 px-1 py-1 text-center bg-gray-800 hover:bg-gray-700 text-white text-sm cursor-pointer" @click="currentBuild = buildIndex">Build: {{ builds[buildIndex].name || (buildIndex + 1) }}<template v-if="buildIndex"> (<a class="text-red-400" @click="delBuild(buildIndex, $event)">Delete</a>)</template></a>
                </template>
                <a class="px-2 py-1 bg-blue-700 hover:bg-blue-600 text-white text-sm cursor-pointer" @click="addBuild()">Add</a>
            </div>
            <!-- Class tabs -->
            <div class="flex flex-col sm:flex-row w-full mb-3 bg-gray-900 class-select" id="class-tab">
                <template v-for="(current, classIndex) in classes">
                    <a v-if="builds[currentBuild].currentClass === classIndex" class="flex-1 px-1 py-1 text-center bg-red-700 hover:bg-red-600 text-white text-sm cursor-pointer">{{ current.name }}</a>
                    <a v-else-if="!totalPoints" class="flex-1 px-1 py-1 text-center bg-gray-800 hover:bg-gray-700 text-white text-sm cursor-pointer" @click="builds[currentBuild].currentClass = classIndex">{{ current.name }}</a>
                </template>
                <a class="px-2 py-1 bg-blue-700 hover:bg-blue-600 text-white text-sm cursor-pointer" @click="resetSkills()">Reset</a>
                <a class="point-display">{{ totalPoints }}</a>
            </div>
            <article class="text-center" :data-class="builds[currentBuild].currentClass">
                <div class="flex flex-wrap">
                    <div v-for="(tab, tabIndex) in classes[builds[currentBuild].currentClass].tabs" class="skill-tab-wrapper w-full sm:w-1/3" :data-tab="tabIndex">
                        <div class="skill-tab bg-dark">
                            <h2 class="text-base my-2 hlh-2">{{ tab.name }}</h2>
                            <div class="skill-tab-content">
                                <img class="skill-tab-background" alt="" :src="'images/' + builds[currentBuild].currentClass + '-' + tabIndex + '.svg'">
                                <div class="flex flex-wrap gap-0">
                                    <div v-for="(skill, skillIndex) in tab.skills" class="skill-icon-wrapper" style="width:33.333%">
                                        <template v-if="skill && skill.id">
                                            <button class="skill-icon" :data-skill-id="skill.id" @click="skillClick(skill.id, true, $event)" @contextmenu="skillClick(skill.id, false, $event)"></button>
                                            <div :class="'skill-icon-tooltip px-2 py-1' + (skillIndex < 9 ? ' bottom' : ' top') + [' right', ' center', ' left'][skillIndex % 3]">
                                                <h3 class="h5 title">{{ (skills[skill.id] && skills[skill.id].name) || d2.skills[skill.id].skill || 'Unknown Skill' }} ({{ skill.id }})</h3>
                                                <div class="my-1 desc">
                                                    <p v-if="skills[skill.id] && skills[skill.id].desc" class="text-pre">{{ skills[skill.id].desc }}</p>
                                                    <p v-for="line in skillDesc(skill.id)" :class="'desc-line text-pre type-' + line.type">{{ line.desc }}</p>
                                                    <p v-if="d2.skills[skill.id].reqlevel && d2.skills[skill.id].reqlevel > 1">Required Level: {{ d2.skills[skill.id].reqlevel }}</p>
                                                    <p v-if="skills[skill.id] && skills[skill.id].synergy" class="text-pre"><span class="synergy-title">{{ (skills[skill.id] && skills[skill.id].name) || d2.skills[skill.id].skill || 'Unknown Skill' }} synergies:</span><span v-for="synergy in skills[skill.id].synergy" class="synergy"><span class="synergy-name">{{ (skills[synergy[0]] && skills[synergy[0]].name) || d2.skills[synergy[0]].skill || 'Unknown Skill' }}{{ synergy[1] ? ': ' : '' }}</span><span v-if="synergy[1]" class="synergy-value">{{ synergy[1] }}</span></span></p>
                                                </div>
                                            </div>
                                            <input class="skill-icon-input" type="text" v-model.number="builds[currentBuild][skill.id]" v-on:input="skillCheck(skill.id, $event)">
                                        </template>
                                        <template v-else>
                                            <div class="empty-skill-icon"></div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </body>
    <script src="vue-setup-tw.js"></script>
    <script src="skills.js"></script>
</html>
