<!doctype html>
<html class="bg-dark">
	<head>
		<title>Diablo 2 Unique &amp; Set Item Browser</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
		<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
	</head>
	<body class="container p-0 bg-dark">
		<div class="card my-sm-5">
			<nav class="nav nav-tabs" id="app-tab" role="tablist">
				<a class="nav-item nav-link active" id="unique-tab" data-toggle="tab" href="#uniqueitemsapp" role="tab" aria-selected="true">Unique Items</a>
				<a class="nav-item nav-link" id="setitems-tab" data-toggle="tab" href="#setitemsapp" role="tab" aria-selected="false">Set Items</a>
			</nav>
			<div class="tab-content bg-white" id="tab-content">
				<!-- Unique Items Tab -->
				<div id="uniqueitemsapp" class="tab-pane fade show active" role="tabpanel" aria-labelledby="unique-tab">
					<h1 class="card-header bg-primary text-light text-center">{{ pageTitle }}</h1>
					<div class="card-body">
						<p v-if="!visible" class="text-center">Loading...</p>
						<div class="row form-group">
							<div class="col-12 col-md">
								<label>Search by Name</label>
								<input type="text" class="form-control form-control-sm" v-model="contains">
							</div>
							<div class="col-12 col-md">
								<label>Min Req Level: {{ levelreqlower }}</label>
								<input type="range" class="form-control form-control-sm" min="0" :max="maxlevelreq" v-model.number="levelreqlower">
							</div>
							<div class="col-12 col-md">
								<label>Max Req Level: {{ levelrequpper }}</label>
								<input type="range" class="form-control form-control-sm" min="0" :max="maxlevelreq" v-model.number="levelrequpper">
							</div>
							<div class="col-12 col-md">
								<label>Version</label>
								<select class="form-control form-control-sm" v-model="version">
									<option value="All">All</option>
									<option value="Classic">Classic</option>
									<option value="LoD">Lord of Destruction</option>
								</select>
							</div>
							<div class="col-12 col-md-auto m-auto">
								<button class="btn btn-primary" @click="resetValues">Reset</button>
							</div>
						</div>
					</div>
					<div class="table-responsive">
						<table v-if="visible" class="table table-sm m-0">
							<thead class="table-primary">
								<tr>
									<th v-for="(column, index) in columns" :key="index" :class="column.headclass" :style="first(column.headstyle, defaults.headstyle)" @click="sort(column)">{{ column.label }}</th>
								</tr>
							</thead>
							<tbody>
								<tr v-for="item in items" :key="item['*ID']" v-if="canShow(item)">
									<td v-for="(column, index) in columns" :key="index" :style="first(column.style, defaults.style)">{{ column.render ? column.render(item) : '' }}</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
				<!-- Set Items Tab -->
				<div id="setitemsapp" class="tab-pane fade" role="tabpanel" aria-labelledby="setitems-tab">
					<h1 class="card-header bg-primary text-light text-center">{{ pageTitle }}</h1>
					<div class="card-body">
						<p v-if="!visible" class="text-center">Loading...</p>
						<div class="row form-group">
							<div class="col-12 col-md">
								<label>Search by Item Name</label>
								<input type="text" class="form-control form-control-sm" v-model="contains">
							</div>
							<div class="col-12 col-md">
								<label>Search by Set</label>
								<input type="text" class="form-control form-control-sm" v-model="setcontains">
							</div>
							<div class="col-12 col-md">
								<label>Min Req Level: {{ levelreqlower }}</label>
								<input type="range" class="form-control form-control-sm" min="0" :max="maxlevelreq" v-model.number="levelreqlower">
							</div>
							<div class="col-12 col-md">
								<label>Max Req Level: {{ levelrequpper }}</label>
								<input type="range" class="form-control form-control-sm" min="0" :max="maxlevelreq" v-model.number="levelrequpper">
							</div>
							<div class="col-12 col-md-auto m-auto">
								<button class="btn btn-primary" @click="resetValues">Reset</button>
							</div>
						</div>
					</div>
					<div class="table-responsive">
						<table v-if="visible" class="table table-sm m-0">
							<thead class="table-primary">
								<tr>
									<th v-for="(column, index) in columns" :key="index" :class="column.headclass" :style="first(column.headstyle, defaults.headstyle)" @click="sort(column)">{{ column.label }}</th>
								</tr>
							</thead>
							<tbody>
								<tr v-for="item in items" :key="item.index" v-if="canShow(item)">
									<td v-for="(column, index) in columns" :key="index" :style="first(column.style, defaults.style)">{{ column.render ? column.render(item) : '' }}</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
			<div class="card-footer text-center"><em>Powered by <a href="https://vuejs.org">Vue.js</a> and <a href="https://getbootstrap.com">Bootstrap 4</a></em></div>
		</div>
	</body>
	<script src="vue-setup.js"></script>
	<script src="uniqueitems.js"></script>
	<script src="setitems.js"></script>
</html>
